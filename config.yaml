server:
  listen_addr: "127.0.0.1:1080"
  max_connections: 4096
  max_inflight_dials: 2048

metrics:
  enabled: true
  listen_addr: "127.0.0.1:9101"

healthcheck:
  interval_ms: 5000
  timeout_ms: 2000

tcp:
  keepalive_ms: 30000

timeouts:
  dial_ms: 15000
  read_ms: 60000
  write_ms: 60000
  idle_ms: 600000
  shutdown_grace_period_ms: 10000

backends:
  github:
    addresses:
      - "140.82.121.4:443"
    healthcheck: {}
  quay:
    addresses:
      - "54.235.146.154:443"
      - "34.236.22.175:443"
      - "54.166.47.210:443"
    healthcheck: {}
  quay-cdn:
    addresses:
      - "2.18.244.226:443"
      - "2.18.244.213:443"
    healthcheck: {}
  dns-8:
    addresses:
      - "8.8.8.8:443"
    healthcheck: {}
  dns-1:
    addresses:
      - "1.0.0.1:443"
    healthcheck: {}
  load:
    addresses:
      - "127.0.0.1:8088"
    healthcheck: {}
  hetzner:
    addresses:
      - "88.198.248.254:443"
      - "88.198.248.254:80"
    healthcheck: {}
  tele2:
    addresses:
      - "90.130.70.73:80"
    healthcheck: {}

routes:
  "github.com": "github"
  "quay.io": "quay"
  "cdn01.quay.io": "quay-cdn"
  "8.8.8.8": "dns-8"
  "1.0.0.1": "dns-1"
  "load.local": "load"
  "speed.hetzner.de": "hetzner"
  "speedtest.tele2.net": "tele2"
